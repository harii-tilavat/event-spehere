services:
  mysql:
    image: mysql:8
    container_name: eventsphere-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-eventsphere_dev}
      MYSQL_DATABASE: eventsphere
    volumes:
      - eventsphere_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-eventsphere_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eventsphere_mysql:
